name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Copy Python source into Android project
        run: |
          mkdir -p android/app/src/main/python
          cp app.py android/app/src/main/python/
          cp database.py android/app/src/main/python/
          cp -r templates android/app/src/main/python/

      - name: Build APK
        run: |
          cd android
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KesitTayini-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
